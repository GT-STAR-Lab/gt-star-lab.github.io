<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
  <title>{% if page.categories.first == 'home' %}{{ site.title }}{% elsif page.title %}{{ page.title }} · {{ site.short_title }}{% else %}{{ site.title }}{% endif %}</title>

  <script>
    (function () {
      var theme;
      try {
        theme = localStorage.getItem('star-theme');
      } catch (error) {
        theme = null;
      }

      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
      }

      document.documentElement.setAttribute('data-theme', theme);
    }());
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&amp;family=Source+Serif+4:opsz,wght@8..60,500..700&amp;display=swap" rel="stylesheet">
  <link href="{{ '/css/style.css' | relative_url }}" rel="stylesheet">
  <link rel="icon" href="{{ '/images/favicon.png' | relative_url }}">

  <script src="{{ '/js/jquery.min.js' | relative_url }}" defer></script>
  <script src="{{ '/js/bootstrap.min.js' | relative_url }}" defer></script>
  <script src="{{ '/js/theme.js' | relative_url }}" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  {% include site-nav.html %}

  <main id="main-content" class="site-main container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <span>&copy; {{ site.time | date: '%Y' }} {{ site.short_title }}</span>
      <span>Georgia Institute of Technology</span>
    </div>
  </footer>
</body>
</html>
